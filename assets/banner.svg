<svg width="1500" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#001a00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="100" x2="1500" y2="100" stroke="#00ff4110" stroke-width="1"/>
  <line x1="0" y1="200" x2="1500" y2="200" stroke="#00ff4110" stroke-width="1"/>
  <line x1="0" y1="300" x2="1500" y2="300" stroke="#00ff4110" stroke-width="1"/>
  <line x1="375" y1="0" x2="375" y2="400" stroke="#00ff4110" stroke-width="1"/>
  <line x1="750" y1="0" x2="750" y2="400" stroke="#00ff4110" stroke-width="1"/>
  <line x1="1125" y1="0" x2="1125" y2="400" stroke="#00ff4110" stroke-width="1"/>

  <!-- Terminal prompt -->
  <text x="50" y="60" font-family="monospace" font-size="14" fill="#00aa2a">
    guest@fsociety:~$ whoami
  </text>

  <!-- Main Name -->
  <text x="750" y="180" font-family="monospace" font-size="56" fill="#00ff41" 
        text-anchor="middle" font-weight="bold" letter-spacing="8">
    ASHWIN ADHIKARI | the008killer
  </text>

  <!-- Subtitle -->
  <text x="750" y="230" font-family="monospace" font-size="18" fill="#00aa2a" 
        text-anchor="middle" letter-spacing="6">
    ENGINEER  |  DEVELOPER  |  HACKER 
  </text>

  <!-- Bottom terminal -->
  <text x="50" y="360" font-family="monospace" font-size="14" fill="#00aa2a">
    guest@fsociety:~$ cat /etc/passion → eat, sleep, hack, repeat_█
  </text>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1460" height="360" fill="none" 
        stroke="#00ff41" stroke-width="1" opacity="0.3"/>
</svg>
